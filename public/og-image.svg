<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="La Copa Familiar — Quiniela en familia · Mundial 2026">
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#EFE9DA"/>
    </linearGradient>
    <linearGradient id="ogCup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F2C75A"/>
      <stop offset="100%" stop-color="#D08A28"/>
    </linearGradient>
    <pattern id="ogDots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.1" cy="1.1" r="1.1" fill="#1B2A52" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#ogDots)"/>

  <!-- Cinta navy superior/inferior -->
  <rect x="0" y="0"   width="1200" height="10" fill="#1B2A52"/>
  <rect x="0" y="620" width="1200" height="10" fill="#1B2A52"/>

  <!-- Trofeo + pelota (logo) a la izquierda, sin fondo circular -->
  <g transform="translate(170 95) scale(7.5)">
    <path d="M18,20 C9,20 9,33 18,35"
          fill="none" stroke="url(#ogCup)" stroke-width="4" stroke-linecap="round"/>
    <path d="M46,20 C55,20 55,33 46,35"
          fill="none" stroke="url(#ogCup)" stroke-width="4" stroke-linecap="round"/>
    <path d="M17,16 L47,16
             L 45,34
             C 44.5,40 39,44 32,44
             C 25,44 19.5,40 19,34 Z"
          fill="url(#ogCup)" stroke="#8A5A14" stroke-width="1.4" stroke-linejoin="round"/>
    <g transform="translate(32 29)">
      <circle r="9" fill="#FFFFFF" stroke="#1B2A52" stroke-width="1.2"/>
      <path d="M0,-3.4 L3.2,-1.1 L2,2.8 L-2,2.8 L-3.2,-1.1 Z" fill="#1B2A52"/>
      <path d="M  0,-9   L  2.4,-5.8 L -2.4,-5.8 Z" fill="#1B2A52"/>
      <path d="M  8.2,-3.4 L  5.6,-1   L  5.6,-5.2 Z" fill="#1B2A52"/>
      <path d="M -8.2,-3.4 L -5.6,-1   L -5.6,-5.2 Z" fill="#1B2A52"/>
      <path d="M  5.4, 7   L  2.4, 4.4 L  5.6, 2.6 Z" fill="#1B2A52"/>
      <path d="M -5.4, 7   L -2.4, 4.4 L -5.6, 2.6 Z" fill="#1B2A52"/>
    </g>
    <rect x="28" y="44" width="8" height="4" fill="url(#ogCup)"/>
    <path d="M22,48 L42,48 L39,54 L25,54 Z"
          fill="url(#ogCup)" stroke="#8A5A14" stroke-width="1.2" stroke-linejoin="round"/>
  </g>

  <!-- Tipografía a la derecha -->
  <g font-family="Geist, 'Helvetica Neue', Arial, sans-serif" fill="#1B2A52">
    <text x="640" y="250" font-size="92" font-weight="700" letter-spacing="-1">La Copa</text>
    <text x="640" y="346" font-size="92" font-weight="700" letter-spacing="-1">Familiar</text>
    <text x="640" y="404" font-size="32" font-weight="500" fill="#3A4A78">Quiniela en familia · Mundial 2026</text>
  </g>
</svg>
