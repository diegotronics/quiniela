    <!-- Tema (anti-FOUC) — aplica data-theme antes de React.
         Default: dark. Respeta la preferencia guardada en localStorage. -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('lcf-theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
